########################################################################
# Plugins
########################################################################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

# Continuum & Resurrect settings
set -g @continuum-restore on
set -g @continuum-save-interval 10
set -g @resurrect-capture-pane-contents on
set -g @resurrect-strategy-nvim session
set -g @resurrect-processes '~julia'

########################################################################
# General Settings
########################################################################
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"     # Better color support from B
set -g history-limit 50000               # Increased limit from B
set -g mouse on
set -g status-position bottom            # Sticking with A's bottom bar
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0
set -g focus-events on                   # Useful for Vim (from B)
set -g detach-on-destroy off             # Don't exit tmux when closing last pane
setw -g aggressive-resize on

# Copy mode (Vi style from B)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

########################################################################
# Key Bindings
########################################################################

# Prefix (STRICTLY C-a as requested)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config (From B)
bind q source-file ~/.tmux.conf \; display "Configuration reloaded"

# Pane splitting (Merging A & B)
# Note: Using B's logic for h/v splits but keeping them on the prefix
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
bind x kill-pane
bind c new-window -c "#{pane_current_path}"

# Vim-Tmux Navigator (From A)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\S+\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Pane Navigation (Alt+Ctrl+Arrows from B - No Prefix Needed)
bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D

# Pane Resizing (Alt+Ctrl+Shift+Arrows from B)
bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Down resize-pane -D 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5

# Window Navigation (Alt+Numbers and Alt+Arrows from B)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1

# Management (From B)
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind K kill-session
bind P switch-client -p
bind N switch-client -n

########################################################################
# Theme / Status Bar
########################################################################
set-option -g status-style bg=#EFE9E2,fg=colour241
set-window-option -g window-status-current-style bg=#EFE9E2,fg=colour223
set-window-option -g window-status-separator ""
set-window-option -g window-status-format "#[bg=colour239,fg=colour246] #I  #W #[bg=#EFE9E2,fg=colour239]"
set-window-option -g window-status-current-format "#[bg=colour208,fg=colour235] #I  #W #[bg=#EFE9E2,fg=colour208]"
set-option -g pane-active-border-style fg=colour24,bg=#EFE9E2
set-option -g status-left-length 80
set-option -g status-right-length 80

set-option -g status-left "#[bg=colour241,fg=colour248] #S #[bg=#EFE9E2,fg=colour241]"
set-option -g status-right "#[bg=#EFE9E2,fg=colour239]#[bg=colour239,fg=colour246] %Y-%m-%d  %H:%M #{battery_color_fg}#[bg=colour239]#{battery_color_bg}#[fg=colour223] #{battery_percentage} "

########################################################################
# TPM plugin manager
########################################################################
run '~/.tmux/plugins/tpm/tpm'
